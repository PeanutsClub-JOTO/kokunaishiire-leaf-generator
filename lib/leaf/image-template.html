<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商品リーフ画像</title>
<style>
  @font-face {
    font-family: 'LeafJP';
    src: url('{{FONT_URL}}') format('truetype');
    font-weight: 400 900;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1540px;
    height: 970px;
    overflow: hidden;
  }
  body {
    font-family: 'LeafJP', 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', 'Yu Gothic', 'Meiryo', sans-serif;
  }

  /* ─── ルート変数（テーマで上書き） ─── */
  :root {
    --stripe-a: #ffe68b;
    --stripe-b: #fff9df;
    --copy-color: #7a3a10;
    --copy-shadow: #fff7d0;
    --accent: #f0bf5a;
    --accent-strong: #e01818;
    --bar-bg: #fffdf8;
    --bar-border: #f0bf5a;
  }

  /* ─── テーマ: スナック・ポップコーン ─── */
  .theme-snack {
    --stripe-a: #ffda52;
    --stripe-b: #fff3bd;
    --copy-color: #7a2000;
    --copy-shadow: #fff0a0;
    --accent: #f05a28;
    --accent-strong: #d71920;
  }
  /* ─── テーマ: 和菓子 ─── */
  .theme-wagashi {
    --stripe-a: #f7e7df;
    --stripe-b: #fff8ef;
    --copy-color: #6f2f2a;
    --copy-shadow: #fff0e3;
    --accent: #c78f74;
    --accent-strong: #b4384a;
    --bar-bg: #fffaf3;
    --bar-border: #c78f74;
  }
  /* ─── テーマ: スイーツ・チョコ ─── */
  .theme-sweets {
    --stripe-a: #f6d6aa;
    --stripe-b: #fff1df;
    --copy-color: #5c2a0a;
    --copy-shadow: #ffe5c0;
    --accent: #b77945;
    --accent-strong: #d33131;
    --bar-border: #b77945;
  }
  /* ─── テーマ: さっぱり・涼感 ─── */
  .theme-cool {
    --stripe-a: #c8efff;
    --stripe-b: #effbff;
    --copy-color: #174f7a;
    --copy-shadow: #e0f7ff;
    --accent: #49aee8;
    --accent-strong: #e01846;
    --bar-border: #49aee8;
  }
  /* ─── テーマ: フルーツ・ゼリー ─── */
  .theme-fruit {
    --stripe-a: #ffe08c;
    --stripe-b: #fff6dd;
    --copy-color: #7a3500;
    --copy-shadow: #fff3c0;
    --accent: #ff9f3f;
    --accent-strong: #e84a2a;
    --bar-border: #ff9f3f;
  }

  /* ─── 外枠 ─── */
  .leaf {
    position: relative;
    width: 1540px;
    height: 970px;
    overflow: hidden;
    background:
      repeating-linear-gradient(90deg, var(--stripe-a) 0 40px, var(--stripe-b) 40px 80px);
    border: 6px solid var(--accent);
  }

  /* AI背景 — テンプレートにスタイルを注入 */
  .leaf-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    /* {{AI_BG_STYLE}} — JSで注入 */
  }

  /* 上部: キャッチコピーエリア */
  .copy-area {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 142px;
    padding: 14px 36px 0 36px;
    z-index: 10;
    display: flex;
    align-items: center;
  }
  .copy-text {
    color: var(--copy-color);
    font-size: 52px;
    font-weight: 900;
    line-height: 1.2;
    text-shadow: 3px 3px 0 var(--copy-shadow), -1px -1px 0 var(--copy-shadow);
    letter-spacing: -0.01em;
    max-height: 130px;
    overflow: hidden;
  }

  /* 商品画像エリア — キャッチコピー下から情報バー上まで */
  .product-area {
    position: absolute;
    top: 138px;
    left: 0;
    right: 0;
    bottom: 130px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 24px;
    gap: 20px;
    z-index: 5;
    background: transparent;
  }

  /* 商品画像スロット: 等幅で商品エリア全高を占有 */
  .img-slot {
    flex: 1;
    min-width: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .img-slot img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    filter: contrast(1.05) saturate(1.1);
  }

  /* アソート4種以上: 2×2 flex-wrap グリッド */
  .product-area.assort-4 {
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .product-area.assort-4 .img-slot {
    flex: 0 0 calc(50% - 10px);
    height: calc(50% - 7px);
  }

  /* アソート5種以上: 3列グリッド（上2下3、または均等） */
  .product-area.assort-5 {
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
  }
  .product-area.assort-5 .img-slot {
    flex: 0 0 calc(33.33% - 14px);
    height: calc(50% - 7px);
  }

  /* 商品画像プレースホルダー */
  .img-placeholder {
    width: 320px;
    height: 320px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 3px dashed var(--accent);
    border-radius: 18px;
    color: var(--copy-color);
    font-size: 28px;
    font-weight: 700;
    opacity: 0.5;
    background: rgba(255,255,255,0.4);
  }

  /* ─── 下部固定情報バー ─── */
  .info-bar {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 130px;
    background: var(--bar-bg);
    border-top: 5px solid var(--bar-border);
    z-index: 20;
    padding: 8px 20px 8px 20px;
  }

  /* 商品コード（極小・薄い） */
  .product-code {
    color: #9ca3af;
    font-size: 11px;
    font-weight: 500;
    line-height: 1;
    height: 13px;
    letter-spacing: 0;
  }

  /* 商品名: 2行まで許容、js-fit でフォント縮小 */
  .product-name {
    position: absolute;
    left: 20px;
    top: 32px;
    width: 560px;
    height: 50px;
    font-size: 38px;
    font-weight: 900;
    line-height: 1.05;
    color: #111;
    overflow: hidden;
    overflow-wrap: break-word;
    word-break: break-all;
  }

  /* 数値メトリクス行 */
  .metrics {
    position: absolute;
    left: 38px;
    bottom: 10px;
    height: 50px;
    display: grid;
    grid-template-columns: 160px 155px 340px 170px;
    align-items: end;
    column-gap: 30px;
  }
  .metric { white-space: nowrap; }
  .metric .num {
    color: var(--accent-strong);
    font-size: 40px;
    font-weight: 900;
    line-height: 0.95;
  }
  .metric .lbl {
    color: #111;
    font-size: 20px;
    font-weight: 700;
    margin-left: 6px;
  }
  .metric .lbl.pre { margin-left: 0; margin-right: 10px; }

  /* 詳細情報（サイズ・賞味期限） */
  .details {
    position: absolute;
    right: 400px;
    top: 18px;
    width: 280px;
    font-size: 17px;
    font-weight: 700;
    color: #111;
    line-height: 1.65;
  }
  .details div::before {
    content: "";
    display: inline-block;
    width: 12px;
    height: 12px;
    margin-right: 7px;
    border-radius: 50%;
    background: #111;
    vertical-align: -1px;
  }
  .details div {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* 受注後納期 */
  .lead-time {
    position: absolute;
    right: 168px;
    top: 28px;
    width: 210px;
    border-top: 4px solid var(--accent-strong);
    border-bottom: 4px solid var(--accent-strong);
    color: var(--accent-strong);
    text-align: center;
    font-size: 24px;
    line-height: 48px;
    font-weight: 900;
    white-space: nowrap;
  }

  /* ハーフ可否 */
  .half {
    position: absolute;
    right: 22px;
    top: 24px;
    width: 136px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    background: #001ee6;
    font-size: 18px;
    font-weight: 800;
    letter-spacing: 0.05em;
  }
  .half.ng { background: #555; }

  /* PJ番号 */
  .pj {
    position: absolute;
    right: 24px;
    bottom: 12px;
    font-size: 16px;
    font-weight: 700;
    color: #111;
    white-space: nowrap;
  }

  /* 仮リーフ表示 */
  .draft-badge {
    position: absolute;
    top: 148px;
    right: 14px;
    background: #f59e0b;
    color: #fff;
    font-size: 14px;
    font-weight: 800;
    padding: 4px 12px;
    border-radius: 4px;
    z-index: 30;
    letter-spacing: 0.05em;
  }
  .draft-badge.hidden { display: none; }
</style>
</head>
<body>
<div class="leaf {{THEME_CLASS}}">

  <!-- AI生成背景 or CSSストライプのみ -->
  <div class="leaf-bg" style="{{AI_BG_STYLE}}"></div>

  <!-- 仮リーフバッジ -->
  <div class="draft-badge {{DRAFT_CLASS}}">{{STATUS_LABEL}}</div>

  <!-- キャッチコピー -->
  <div class="copy-area">
    <div class="copy-text js-fit" data-min-font="32">{{MAIN_COPY}}</div>
  </div>

  <!-- 商品画像エリア -->
  <div class="product-area {{PRODUCT_AREA_CLASS}}">
    {{PRODUCT_IMAGES_HTML}}
  </div>

  <!-- 情報バー -->
  <footer class="info-bar">
    <div class="product-code">{{PRODUCT_CODE}}</div>
    <div class="product-name js-fit" data-min-font="16">{{LEAF_NAME}}</div>

    <div class="metrics">
      <div class="metric">
        <span class="num">{{ITEM_COUNT}}</span><span class="lbl">アイテム</span>
      </div>
      <div class="metric">
        <span class="num">{{LEAF_QTY}}</span><span class="lbl">個入</span>
      </div>
      <div class="metric">
        <span class="lbl pre">卸価格</span><span class="num">{{WHOLESALE_PRICE}}</span><span class="lbl">円(税別)</span>
      </div>
      <div class="metric">
        <span class="lbl pre">単価</span><span class="num">{{UNIT_PRICE}}</span><span class="lbl">円</span>
      </div>
    </div>

    <div class="details">
      <div>商品サイズ / {{PIECE_SIZE}}</div>
      <div>賞味期限 / {{SHELF_LIFE_DAYS}}日</div>
    </div>
    <div class="lead-time js-fit-width" data-min-font="16">{{LEAD_TIME}}</div>
    <div class="half {{HALF_NG_CLASS}}">ハーフ　{{HALF_LABEL}}</div>
    <div class="pj">PJ番号　{{PJ_NO}}</div>
  </footer>

</div>
<script>
  /* テキストをボックス内に収まるようフォントを縮小 */
  function fitHeight(el, minFont) {
    var size = parseFloat(window.getComputedStyle(el).fontSize);
    while ((el.scrollHeight > el.clientHeight || el.scrollWidth > el.clientWidth) && size > minFont) {
      size -= 1;
      el.style.fontSize = size + 'px';
    }
  }
  function fitWidth(el, minFont) {
    var size = parseFloat(window.getComputedStyle(el).fontSize);
    while (el.scrollWidth > el.clientWidth && size > minFont) {
      size -= 1;
      el.style.fontSize = size + 'px';
    }
  }
  document.querySelectorAll('.js-fit').forEach(function(el) {
    fitHeight(el, Number(el.dataset.minFont || 28));
  });
  document.querySelectorAll('.js-fit-width').forEach(function(el) {
    fitWidth(el, Number(el.dataset.minFont || 16));
  });

  /* 画像はCSSの object-fit: contain で制御するためJS制御は不要になりました */
</script>
</body>
</html>
